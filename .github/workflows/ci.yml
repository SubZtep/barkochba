name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx --bun @biomejs/biome check --config-path=.

      - name: Write fake config
        # lib/openai.ts reads the config file at import time, so tests that
        # import it (transitively, e.g. lib/agents.ts) need one to exist.
        run: |
          mkdir -p "$XDG_CONFIG_HOME/kaja"
          cat > "$XDG_CONFIG_HOME/kaja/config.json" <<'EOF'
          {
            "llm": {
              "baseUrl": "http://localhost:1",
              "apiKey": "test",
              "model": "test"
            }
          }
          EOF
        env:
          XDG_CONFIG_HOME: ${{ runner.temp }}/xdg-config

      - name: Test
        run: bun test
        env:
          XDG_CONFIG_HOME: ${{ runner.temp }}/xdg-config
